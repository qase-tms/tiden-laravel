name: CI

# Tests across PHP versions on the latest supported Laravel (via Testbench).
# The package declares support for Laravel 10/11/12 (illuminate ^10||^11||^12);
# CI runs the current secure release. No publish step: Packagist auto-updates
# from this public repo on a git tag.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    name: PHP ${{ matrix.php }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, json
          coverage: none
          tools: composer:v2
      - run: composer validate --strict --no-check-publish
      - run: composer update --no-interaction --no-progress --prefer-dist --prefer-stable
      - run: composer lint
      - run: composer analyse
      - run: composer test
