name: CI

# Tests across PHP + Laravel versions via Orchestra Testbench. No publish step:
# Packagist auto-updates from this public repo on a git tag.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { php: '8.2', testbench: '^8.0' }   # Laravel 10
          - { php: '8.3', testbench: '^9.0' }   # Laravel 11
          - { php: '8.4', testbench: '^10.0' }  # Laravel 12
    name: PHP ${{ matrix.php }} · testbench ${{ matrix.testbench }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, json
          coverage: none
          tools: composer:v2
      - run: composer validate --strict --no-check-publish
      - name: Pin testbench for the matrix Laravel version
        run: composer require --dev --no-update "orchestra/testbench:${{ matrix.testbench }}"
      - run: composer update --no-interaction --no-progress --prefer-dist
      - run: composer test
