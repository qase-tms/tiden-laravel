name: CI

# Tests each supported Laravel against a matching PHP, via Testbench.
# The package supports Laravel 12 + 13 (illuminate ^12||^13, PHP >= 8.3):
# Testbench 10 -> Laravel 12, Testbench 11 -> Laravel 13. No publish step:
# Packagist auto-updates from this public repo on a git tag.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.3'
            testbench: '^10.0' # Laravel 12
          - php: '8.4'
            testbench: '^11.0' # Laravel 13
          - php: '8.5'
            testbench: '^11.0' # Laravel 13
    name: PHP ${{ matrix.php }} (testbench ${{ matrix.testbench }})
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, json
          coverage: none
          tools: composer:v2
      - run: composer validate --strict --no-check-publish
      - run: composer require --dev --no-update "orchestra/testbench:${{ matrix.testbench }}"
      - run: composer update --no-interaction --no-progress --prefer-dist --prefer-stable
      - run: composer lint
      - run: composer analyse
      - run: composer test
